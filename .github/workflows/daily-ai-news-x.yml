name: Daily AI news + X autopost

on:
  schedule:
    # Run at both 11:05 and 12:05 UTC, then gate for 07:05 America/New_York (handles DST)
    - cron: '5 11 * * *'
    - cron: '5 12 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Set true to bypass time gate for manual approval posting'
        required: false
        default: 'false'
      test_text:
        description: 'Optional: post this exact text (for diagnostics)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh news feeds from RSS
        run: |
          node scripts/update-news.mjs
          node scripts/update-youtube-openclaw.mjs

      - name: Commit news files if changed
        run: |
          if git diff --quiet public/news.json public/news-youtube-openclaw.json; then
            echo "No changes in news files"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/news.json public/news-youtube-openclaw.json
          git commit -m "chore: daily news refresh (ai + youtube)"
          git push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tweepy
        run: pip install tweepy

      - name: Post top 3 to X (tweepy)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_TEST_TEXT: ${{ github.event.inputs.test_text }}
        run: python scripts/post-to-x.py

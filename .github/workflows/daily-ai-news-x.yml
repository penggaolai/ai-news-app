name: Daily AI news + X autopost

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Set true to bypass time gate for manual approval posting'
        required: false
        default: 'false'
      test_text:
        description: 'Optional: post this exact text (for diagnostics)'
        required: false
        default: ''
      preview_only:
        description: 'Set true to generate previews without posting to X'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh news feeds from RSS
        run: |
          node scripts/update-news.mjs
          node scripts/update-youtube-openclaw.mjs

      - name: List public directory
        run: ls -l public/

      - name: Commit news files if changed
        run: |
          if git diff --quiet public/news.json public/news-youtube-openclaw.json; then
            echo "No changes in news files"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/news.json public/news-youtube-openclaw.json
          git commit -m "chore: daily news refresh (ai + youtube)"
          git push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tweepy
        run: pip install tweepy

      - name: Post top 3 to X (tweepy)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_TEST_TEXT: ${{ github.event.inputs.test_text }}
          X_PREVIEW_ONLY: ${{ github.event.inputs.preview_only }}
        run: python scripts/post-to-x.py

      - name: Notify Telegram on failure (optional)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram notify skipped: missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret."
            exit 0
          fi
          MSG="⚠️ daily-ai-news-x failed on ${GITHUB_REF_NAME}. Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MSG}" \
            -d disable_web_page_preview=true
